name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-test:
    name: API (TypeScript / Hono)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API
        run: pnpm --filter @leadpulse/api typecheck

      - name: Test API
        run: pnpm --filter @leadpulse/api test

  web-test:
    name: Web (React / Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Web
        run: pnpm --filter @leadpulse/web typecheck

      - name: Test Web
        run: pnpm --filter @leadpulse/web test

  ml-test:
    name: ML Service (FastAPI / Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: latest

      - name: Set up Python
        run: uv python install 3.13

      - name: Install ML dependencies
        working-directory: apps/ml
        run: uv sync

      - name: Run ML tests
        working-directory: apps/ml
        run: uv run pytest tests/ -v
        env:
          ANTHROPIC_API_KEY: placeholder
          ML_SERVICE_SECRET: placeholder
